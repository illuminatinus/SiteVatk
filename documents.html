<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VATK Документы</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="documents">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">VATK</div>
      <nav class="menu">
        <a href="index.html">Дашборд</a>
        <a href="documents.html" class="active">Документы</a>
        <a href="create.html">Создать документ</a>
        <a href="profile.html">Профиль</a>
        <a href="admin.html">Админ</a>
      </nav>
      <div class="sidebar-footer">
        <button id="langToggle" class="button secondary">Қазақ/Рус</button>
        <button id="logoutBtn" class="button danger">Выйти</button>
      </div>
    </aside>
    <main class="content">
      <header class="page-header">
        <div>
          <h1>Документы</h1>
          <p class="subtitle">Управляй файлами и ищи нужные документы.</p>
        </div>
      </header>
      <section class="card filters-card">
        <div class="filter-row">
          <input type="text" id="searchInput" placeholder="Поиск..." />
          <select id="typeFilter">
            <option value="all">Все типы</option>
            <option value="study">Учебные</option>
            <option value="admin">Админ</option>
            <option value="other">Другое</option>
          </select>
          <select id="authorFilter">
            <option value="all">Все авторы</option>
          </select>
          <a href="create.html" class="button primary">Создать документ</a>
        </div>
      </section>
      <section class="card full-card">
        <div id="documentsTable" class="table-wrap"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
