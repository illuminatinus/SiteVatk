<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VATK Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">VATK</div>
      <nav class="menu">
        <a href="index.html" class="active">Дашборд</a>
        <a href="documents.html">Документы</a>
        <a href="create.html">Создать документ</a>
        <a href="profile.html">Профиль</a>
        <a href="admin.html">Админ</a>
      </nav>
      <div class="sidebar-footer">
        <button id="langToggle" class="button secondary">Қазақ/Рус</button>
        <button id="logoutBtn" class="button danger">Выйти</button>
      </div>
    </aside>
    <main class="content">
      <header class="page-header">
        <div>
          <h1>Дашборд</h1>
          <p class="subtitle" id="welcomeText">Привет, пользователь!</p>
        </div>
        <div class="user-badge" id="userBadge"></div>
      </header>
      <section class="grid-3">
        <article class="card">
          <div class="card-title">Последние документы</div>
          <ul id="latestDocsList" class="list"></ul>
        </article>
        <article class="card">
          <div class="card-title">Уведомления</div>
          <ul id="notificationsList" class="list">
            <li>Нет уведомлений</li>
          </ul>
        </article>
        <article class="card">
          <div class="card-title">Быстрый доступ</div>
          <div class="button-group">
            <a href="create.html" class="button">Создать документ</a>
            <a href="documents.html" class="button secondary">Документы</a>
          </div>
        </article>
      </section>
      <section class="card full-card">
        <div class="card-title">Все документы</div>
        <div id="allDocsTable" class="table-wrap"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
