<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VATK Профиль</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="profile">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">VATK</div>
      <nav class="menu">
        <a href="index.html">Дашборд</a>
        <a href="documents.html">Документы</a>
        <a href="create.html">Создать документ</a>
        <a href="profile.html" class="active">Профиль</a>
        <a href="admin.html">Админ</a>
      </nav>
      <div class="sidebar-footer">
        <button id="langToggle" class="button secondary">Қазақ/Рус</button>
        <button id="logoutBtn" class="button danger">Выйти</button>
      </div>
    </aside>
    <main class="content">
      <header class="page-header">
        <div>
          <h1>Профиль</h1>
          <p class="subtitle">Твои данные и созданные документы.</p>
        </div>
      </header>
      <section class="card profile-card">
        <div class="profile-info">
          <h2 id="profileName">Имя</h2>
          <p><strong>Email:</strong> <span id="profileEmail"></span></p>
          <p><strong>Роль:</strong> <span id="profileRole"></span></p>
        </div>
      </section>
      <section class="card full-card">
        <div class="card-title">Мои документы</div>
        <div id="myDocsTable" class="table-wrap"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
